name: E2E Tests\n\non: release:\n  types: [created]\n\njobs:\n  e2e:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v2\n\n      - name: Set up Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '14'\n\n      - name: Install dependencies\n        run: npm install\n\n      - name: Run Playwright tests\n        run: npm run test\n\n      - name: Generate test report\n        run: npm run report\n\n      - name: Upload test report artifacts if the test fails\n        if: failure()\n        uses: actions/upload-artifact@v2\n        with:\n          name: test-report\n          path: ./test-results/
