name: E2E Tests on Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:1000' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'http://localhost:1000/node-api/edge' }}
          PRIMARY_ENV_ID: ${{ vars.PRIMARY_ENV_ID || '511624c3-1e4e-4d2c-a074-12725e3327e2' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

